<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page</title>
</head>
<body bgcolor="black" text="white" link="cyan" vlink="magenta" alink="yellow">
    <header>
        <h1 align="center"><u>TechFest 2026 Registration</u></h1>
    </header>
    <hr>
    <main>
        <div align="center">
            <p>Welcome to the TechFest 2026 registration page! Please fill out the form below to register for the event.</p>
            <hr>
            <br>
            <form>
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" required placeholder="Enter your name here"> <br><br>

                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" required placeholder="Enter your email here"><br><br>

                <label for="college">College/University:</label>
                <input type="text" id="college" name="college" required placeholder="Enter your college/university name"><br><br>

                <label for="gender">Gender:</label>
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label>
                <input type="radio" id="other" name="gender" value="other" required>
                <label for="other">Other</label><br><br>

                <label for="year">Year of Study:</label>
                <select id="year" name="year" required>
                    <option value="">Select Year</option>
                    <option value="1">First Year</option>
                    <option value="2">Second Year</option>
                    <option value="3">Third Year</option>
                    <option value="4">Fourth Year</option>
                </select><br><br>


                <label>Select Events to Participate In:</label><br><br>

                <input type="checkbox" id="coding" name="events" value="Coding Challenge">
                <label for="coding">Coding Challenge</label><br>

                <input type="checkbox" id="webdesign" name="events" value="Web Design Contest">
                <label for="webdesign">Web Design Contest</label><br>

                <input type="checkbox" id="robotics" name="events" value="Robotics Demonstration">
                <label for="robotics">Robotics Demonstration</label><br>

                <input type="checkbox" id="quiz" name="events" value="Technical Quiz">
                <label for="quiz">Technical Quiz</label><br>

                <input type="checkbox" id="project" name="events" value="Project Exhibition">
                <label for="project">Project Exhibition</label><br><br>

                <label for="message">Why do you want to participate?</label><br>
                <textarea id="message" name="message" rows="4" cols="50" required placeholder="Please explain your interest in participating..."></textarea><br><br>


                <input type="submit" value="Register">
            </form>
        </div>
        <br>
    </main>
    <hr>
    <footer>
        <div align="center">
            <p>Thank you for registering for TechFest 2026! We look forward to seeing you at the event.</p>
            <hr>
            <p>&copy; 2026 TechFest. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
